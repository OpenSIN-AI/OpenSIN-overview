# Auto-regenerate registry/ from live GitHub org data.
#
# Why this exists:
#   - registry/MASTER_INDEX.md and registry/SCAFFOLD_AUDIT.md are consumed by
#     external sites (my.opensin.ai marketplace). They must not drift.
#   - Historically these were hand-maintained and went out of sync (188 vs 205
#     repos observed on 2026-04-19). This workflow ensures they stay fresh.
#
# Schedule:
#   - Every day at 06:00 UTC (scheduled sweep)
#   - On manual dispatch (when a maintainer wants an immediate refresh)
#   - On push to main that touches the generator scripts themselves
#
# Auth:
#   - Needs an org-wide read token because gh CLI's default GITHUB_TOKEN only
#     sees the current repo. Store as Actions secret ORG_READ_TOKEN (fine-
#     grained PAT with "Contents: Read" on all OpenSIN-AI repos, or a GitHub
#     App installation token).
#   - If the secret is absent, the workflow fails fast with a clear message.
#
# Output:
#   - If anything changed, commits registry/ updates via github-actions[bot].
#   - If the branch is protected, open a PR instead (configurable below).

name: Regenerate registry

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you forcing a regen? (audit trail)"
        required: false
  push:
    branches: [main]
    paths:
      - ".github/workflows/registry-autogenerate.yml"
      - "scripts/generate-master-index.js"
      - "scripts/audit-repos.js"
      - "package.json"

permissions:
  contents: write

concurrency:
  group: regenerate-registry
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify org read token is configured
        env:
          ORG_READ_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
        run: |
          if [ -z "$ORG_READ_TOKEN" ]; then
            echo "::error::Secret ORG_READ_TOKEN is not set. Create a fine-grained PAT with Contents:Read on OpenSIN-AI/* and store it as ORG_READ_TOKEN in this repo's Actions secrets."
            exit 1
          fi

      - name: Authenticate gh CLI
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
        run: gh auth status

      - name: Regenerate MASTER_INDEX and SCAFFOLD_AUDIT
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
        run: |
          node scripts/generate-master-index.js
          node scripts/audit-repos.js

      - name: Commit + push if changed
        run: |
          if git diff --quiet -- registry/; then
            echo "::notice::No registry changes — nothing to commit."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add registry/
          REASON="${{ github.event.inputs.reason || 'scheduled daily sweep' }}"
          git commit -m "chore(registry): auto-regenerate (${REASON})

          Regenerated by .github/workflows/registry-autogenerate.yml from
          live gh repo list OpenSIN-AI data. See scripts/generate-master-index.js
          and scripts/audit-repos.js for the generator logic."
          git push
