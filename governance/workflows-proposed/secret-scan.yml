# Refuse to merge a PR that introduces a known-shape secret or internal address.
#
# Pairs with scripts/scan-secrets.sh (which can also be wired as a local
# pre-commit hook via .husky/pre-commit). The CI run is the authoritative gate
# because not every contributor installs the local hook.
#
# Why this exists: an n8n_api_… key was committed to README.md and to
# docs/best-practices/ci-cd-n8n.md before this gate existed. The value is
# rotated, but the same class of bug must not recur. CI catches it the moment
# the PR is opened.
#
# Cost: ~10 s, no network calls — pure regex over the working tree.

name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run regex secret scanner
        run: bash scripts/scan-secrets.sh

      - name: Show what to do if this fails
        if: failure()
        run: |
          {
            echo "### A potential secret was detected"
            echo ""
            echo "Read SECURITY.md for the rotation procedure."
            echo "Then move the value to **Infra-SIN-Dev-Setup** (private)."
            echo "Reference it from this repo only by env-var name."
          } >> "$GITHUB_STEP_SUMMARY"
